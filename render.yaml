services:
  - type: web
    name: reportready
    env: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: PORT
        value: 10000
      - key: STRIPE_SECRET_KEY
        fromValue: ${STRIPE_SECRET_KEY}
      - key: RESEND_API_KEY
        fromValue: ${RESEND_API_KEY}
