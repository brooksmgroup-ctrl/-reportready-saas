# Render Deployment Configuration
services:
  - type: web
    name: reportready-saas
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: STRIPE_SECRET_KEY
        fromValue: ${STRIPE_SECRET_KEY}
      - key: RESEND_API_KEY
        fromValue: ${RESEND_API_KEY}
      - key: CLIENT_URL
        value: https://getreportready.com
